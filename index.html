<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Garage · Gerador de Avatar e Banner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --lime:#EAFD7C;
    --purple:#C299EE;
    --dark:#1a1a1a;
    --bg:#0f0f0f;
    --surface:#1a1a1a;
    --surface2:#222;
    --border:#333;
    --text:#f0f0f0;
    --muted:#888;
  }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Courier New',Courier,monospace;
    min-height:100vh;
    padding:0;
  }
  header{
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:1.2rem 2rem;
    display:flex;
    align-items:center;
    gap:1rem;
  }
  .logo-dots{display:flex;gap:5px;}
  .dot{width:14px;height:14px;border-radius:50%;}
  .dot-p{background:var(--purple);}
  .dot-l{background:var(--lime);}
  header h1{
    font-size:15px;
    font-weight:700;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--lime);
  }
  header span{
    font-size:12px;
    color:var(--muted);
    letter-spacing:.08em;
  }
  main{max-width:860px;margin:0 auto;padding:2rem 1.5rem;}

  .tabs{display:flex;gap:6px;margin-bottom:1.5rem;}
  .tab{
    padding:7px 18px;
    font-size:13px;
    font-weight:700;
    font-family:'Courier New',monospace;
    letter-spacing:.05em;
    border:1.5px solid var(--border);
    border-radius:4px;
    cursor:pointer;
    background:none;
    color:var(--muted);
    transition:all .15s;
  }
  .tab.on{background:var(--purple);color:#1a1a1a;border-color:var(--purple);}
  .tab:hover:not(.on){border-color:var(--purple);color:var(--purple);}

  .drop-zone{
    border:2px dashed var(--border);
    border-radius:8px;
    padding:3rem 2rem;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s;
    background:var(--surface);
  }
  .drop-zone:hover,.drop-zone.drag{border-color:var(--purple);}
  .drop-icon{
    width:44px;height:44px;
    border-radius:50%;
    background:var(--purple);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto .8rem;
  }
  .drop-zone p{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .drop-zone small{font-size:12px;color:var(--muted);}

  .controls{
    display:flex;flex-direction:column;gap:8px;
    margin-top:1rem;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:1rem 1.1rem;
  }
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  label.check{
    display:flex;align-items:center;gap:6px;
    font-size:13px;cursor:pointer;color:var(--text);
  }
  label.check input{accent-color:var(--purple);cursor:pointer;}
  .lbl{font-size:13px;color:var(--muted);white-space:nowrap;min-width:72px;}
  input[type=text]{
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:4px;
    color:var(--text);
    font-family:'Courier New',monospace;
    font-size:13px;
    padding:6px 10px;
    outline:none;
    transition:border-color .15s;
  }
  input[type=text]:focus{border-color:var(--purple);}
  input[type=text]::placeholder{color:#555;}
  input[type=range]{cursor:pointer;accent-color:var(--purple);}
  .val{font-size:13px;font-weight:700;color:var(--lime);min-width:28px;}

  .btn-ghost{
    font-size:12px;color:var(--muted);
    background:none;
    border:1px solid var(--border);
    border-radius:4px;
    padding:4px 10px;
    cursor:pointer;
    font-family:'Courier New',monospace;
    transition:all .15s;
  }
  .btn-ghost:hover{border-color:var(--purple);color:var(--purple);}

  .btn-gen{
    align-self:flex-start;
    padding:9px 24px;
    background:var(--lime);
    color:#1a1a1a;
    border:none;
    border-radius:4px;
    font-family:'Courier New',monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:.05em;
    cursor:pointer;
    margin-top:4px;
    transition:opacity .15s;
  }
  .btn-gen:hover{opacity:.85;}

  .previews{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1.25rem;
    margin-top:1.5rem;
  }
  @media(max-width:600px){.previews{grid-template-columns:1fr;}}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
  }
  .card-hd{
    padding:10px 13px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;
    letter-spacing:.06em;
    color:var(--muted);
  }
  .card-bd{padding:12px;text-align:center;}
  .card-bd canvas{max-width:100%;display:block;border-radius:4px;}
  .card-ft{padding:0 12px 12px;}
  .dl-btn{
    width:100%;padding:8px;
    border:none;border-radius:4px;
    font-family:'Courier New',monospace;
    font-weight:700;font-size:13px;
    cursor:pointer;
    transition:opacity .15s;
  }
  .dl-btn:hover{opacity:.85;}

  hr.sep{border:none;border-top:1px solid var(--border);margin:6px 0;}

  footer{
    text-align:center;
    padding:2rem;
    color:var(--muted);
    font-size:12px;
    letter-spacing:.06em;
    border-top:1px solid var(--border);
    margin-top:3rem;
  }
  footer span{color:var(--lime);}
</style>
</head>
<body>

<header>
  <div class="logo-dots">
    <div class="dot dot-p"></div>
    <div class="dot dot-l"></div>
  </div>
  <div>
    <h1>The Garage</h1>
    <span>Gerador de Avatar &amp; Banner · SuperTeam Brasil</span>
  </div>
</header>

<main>

  <div class="tabs">
    <button class="tab on" id="tabAV" onclick="setMode('av')">Avatar (foto)</button>
    <button class="tab" id="tabBN" onclick="setMode('bn')">Banner de texto</button>
  </div>

  <!-- AVATAR -->
  <div id="secAV">
    <div class="drop-zone" id="dz"
      onclick="document.getElementById('fi').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="onDrop(event)">
      <div class="drop-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p>Arraste ou clique para escolher sua foto</p>
      <small>JPG ou PNG · rosto funciona melhor</small>
    </div>
    <input type="file" id="fi" accept="image/*" style="display:none">

    <div id="avCtrl" class="controls" style="display:none;">
      <div class="row">
        <label class="check"><input type="checkbox" id="circ" checked> Circular</label>
        <label class="check"><input type="checkbox" id="avHT" checked> Halftone</label>
        <label class="check"><input type="checkbox" id="avLG"> Logos</label>
        <button class="btn-ghost" onclick="document.getElementById('fi').click()">Trocar foto</button>
      </div>
      <hr class="sep">
      <div id="avHTrow" class="row">
        <span class="lbl">Pontos</span>
        <input type="range" id="avGS" min="3" max="12" value="5" step="1" style="width:120px;">
        <span class="val" id="avGSo">5px</span>
      </div>
      <div class="row">
        <span class="lbl">Handle / nome</span>
        <input type="text" id="avTXT" placeholder="@seuhandle" style="flex:1;max-width:240px;" autocomplete="off">
      </div>
    </div>
    <div id="avPV" class="previews" style="display:none;"></div>
  </div>

  <!-- BANNER -->
  <div id="secBN" style="display:none;">
    <div class="controls">
      <div class="row">
        <span class="lbl">Título</span>
        <input type="text" id="bnT1" placeholder="Design Thinking" style="flex:1;font-weight:700;font-size:14px;" autocomplete="off">
      </div>
      <div class="row">
        <span class="lbl">Subtítulo</span>
        <input type="text" id="bnT2" placeholder="com Miro Leite · April 14 · Online" style="flex:1;" autocomplete="off">
      </div>
      <div class="row">
        <span class="lbl">Tag</span>
        <input type="text" id="bnT3" placeholder="THE/GARAGE · Cohort.1" style="width:240px;" autocomplete="off">
      </div>
      <hr class="sep">
      <div class="row">
        <label class="check"><input type="checkbox" id="bnHT" checked> Halftone</label>
        <label class="check"><input type="checkbox" id="bnLG" checked> Logos</label>
      </div>
      <div id="bnHTrow" class="row">
        <span class="lbl">Pontos</span>
        <input type="range" id="bnGS" min="3" max="14" value="7" step="1" style="width:120px;">
        <span class="val" id="bnGSo">7px</span>
      </div>
      <button class="btn-gen" onclick="renderBanner()">Gerar banner</button>
    </div>
    <div id="bnPV" class="previews" style="display:none;"></div>
  </div>

</main>

<footer>
  Feito com 💜 pela <span>SuperTeam Brasil</span> · THE/GARAGE Cohort.1
</footer>

<script>
var _img = null;
var VARS = [
  {bg:'#EAFD7C',fg:'#C299EE',inv:false,label:'Fundo limão',id:'lime'},
  {bg:'#C299EE',fg:'#EAFD7C',inv:true, label:'Fundo roxo', id:'purple'}
];

function setMode(m) {
  document.getElementById('secAV').style.display = m==='av'?'block':'none';
  document.getElementById('secBN').style.display = m==='bn'?'block':'none';
  document.getElementById('tabAV').className = 'tab'+(m==='av'?' on':'');
  document.getElementById('tabBN').className = 'tab'+(m==='bn'?' on':'');
}

function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function drawPhotoHT(img,ctx,sz,bg,fg,inv,circ,gs){
  var tmp=document.createElement('canvas');tmp.width=sz;tmp.height=sz;
  var tc=tmp.getContext('2d');
  var s=Math.min(img.width,img.height);
  tc.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,sz,sz);
  var px=tc.getImageData(0,0,sz,sz).data;
  ctx.save();
  if(circ){ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2,0,Math.PI*2);ctx.clip();}
  ctx.fillStyle=bg;ctx.fillRect(0,0,sz,sz);
  ctx.fillStyle=fg;ctx.beginPath();
  for(var y=0;y<sz;y+=gs){for(var x=0;x<sz;x+=gs){
    var sum=0,cnt=0;
    for(var dy=0;dy<gs&&y+dy<sz;dy++){for(var dx=0;dx<gs&&x+dx<sz;dx++){
      var i=((y+dy)*sz+(x+dx))*4;sum+=.299*px[i]+.587*px[i+1]+.114*px[i+2];cnt++;
    }}
    var lum=sum/cnt/255,t=inv?lum:(1-lum);
    var r=Math.min((gs/2)*t*1.45,gs/2*.98);
    if(r>0.15){ctx.moveTo(x+gs/2+r,y+gs/2);ctx.arc(x+gs/2,y+gs/2,r,0,Math.PI*2);}
  }}
  ctx.fill();ctx.restore();
}

function drawPhotoDT(img,ctx,sz,bg,fg,circ){
  var tmp=document.createElement('canvas');tmp.width=sz;tmp.height=sz;
  var tc=tmp.getContext('2d');
  var s=Math.min(img.width,img.height);
  tc.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,sz,sz);
  var id=tc.getImageData(0,0,sz,sz);var d=id.data;
  var bc=h2r(fg),lc=h2r(bg);
  for(var j=0;j<d.length;j+=4){
    var l=(.299*d[j]+.587*d[j+1]+.114*d[j+2])/255;
    d[j]=Math.round(bc[0]+(lc[0]-bc[0])*l);
    d[j+1]=Math.round(bc[1]+(lc[1]-bc[1])*l);
    d[j+2]=Math.round(bc[2]+(lc[2]-bc[2])*l);d[j+3]=255;
  }
  if(circ){ctx.save();ctx.beginPath();ctx.arc(sz/2,sz/2,sz/2,0,Math.PI*2);ctx.clip();ctx.putImageData(id,0,0);ctx.restore();}
  else ctx.putImageData(id,0,0);
}

function drawWaveHT(ctx,sz,bg,fg,gs){
  ctx.fillStyle=bg;ctx.fillRect(0,0,sz,sz);
  ctx.fillStyle=fg;ctx.beginPath();
  for(var y=0;y<=sz;y+=gs){for(var x=0;x<=sz;x+=gs){
    var dx=(x-sz/2)/sz,dy=(y-sz/2)/sz;
    var r=Math.sqrt(dx*dx+dy*dy),a=Math.atan2(dy,dx);
    var w=(Math.sin(r*28-a*4+Math.sin(r*12)*2)+1)/2;
    var dr=Math.min((gs/2)*Math.pow(w,.75)*1.15,gs/2*.97);
    if(dr>0.2){ctx.moveTo(x+gs/2+dr,y+gs/2);ctx.arc(x+gs/2,y+gs/2,dr,0,Math.PI*2);}
  }}
  ctx.fill();
}

function drawLogos(ctx,sz,fg,bg){
  var sh=Math.round(sz*.09),y0=sz-sh,mid=y0+sh/2,fs=Math.round(sh*.26);
  var bh=Math.round(fs*.22),bw=Math.round(fs*.68),sp=Math.round(fs*.33);
  var lpad=sz*.05,lw=sz*.9,zw=lw/4;
  ctx.fillStyle=bg;ctx.fillRect(0,y0,sz,sh);
  ctx.fillStyle=fg;
  ctx.fillRect(lpad,y0+1,lw,Math.max(1,Math.round(sz*.0015)));
  ctx.textBaseline='middle';
  var z1=lpad+zw/2;
  ctx.font='bold '+fs+'px monospace';
  var sTW=ctx.measureText('SOLANA').width,stot=bw+5+sTW,sx=z1-stot/2;
  ctx.fillRect(sx+Math.round(bw*.15),mid-sp-bh/2,bw,bh);
  ctx.fillRect(sx,mid-bh/2,bw,bh);
  ctx.fillRect(sx+Math.round(bw*.15),mid+sp-bh/2,bw,bh);
  ctx.textAlign='left';ctx.fillText('SOLANA',sx+bw+5,mid);
  var z2=lpad+zw+zw/2;
  ctx.font=fs+'px monospace';
  var stTW=ctx.measureText('superteam brasil').width;
  var sqS=Math.round(fs*.88),stTot=sqS+5+stTW,stx=z2-stTot/2;
  ctx.font='bold '+fs+'px monospace';
  ctx.fillRect(stx,mid-sqS/2,sqS,sqS);
  ctx.fillStyle=bg;ctx.font='bold '+Math.round(fs*.47)+'px monospace';ctx.textAlign='center';
  ctx.fillText('ST',stx+sqS/2,mid);
  ctx.fillStyle=fg;ctx.font=fs+'px monospace';ctx.textAlign='left';
  ctx.fillText('superteam brasil',stx+sqS+5,mid);
  ctx.font='bold '+fs+'px monospace';ctx.textAlign='center';
  ctx.fillText('THE/GARAGE',lpad+zw*2+zw/2,mid);
  var z4=lpad+zw*3+zw/2;
  var colH=Math.round(fs*.6),colW=Math.round(fs*.14),colG=Math.round(fs*.23);
  var pillW=3*colW+2*colG;
  ctx.font=fs+'px monospace';
  var colTW=ctx.measureText('COLOSSEUM').width,colTot=pillW+5+colTW,colx=z4-colTot/2;
  ctx.fillStyle=fg;
  for(var c=0;c<3;c++){var px_=colx+c*(colW+colG);ctx.fillRect(px_,mid-colH/2,colW,colH);ctx.fillRect(px_-1,mid-colH/2-3,colW+2,3);}
  ctx.textAlign='left';ctx.fillText('COLOSSEUM',colx+pillW+5,mid);
}

function drawHandle(ctx,sz,txt,fg,bg,hasLg){
  if(!txt||!txt.trim())return;
  var sh=Math.round(sz*.075),lgSh=hasLg?Math.round(sz*.09):0,y0=sz-sh-lgSh;
  ctx.fillStyle=fg;ctx.fillRect(0,y0,sz,sh);
  ctx.fillStyle=bg;
  ctx.font='bold '+Math.round(sh*.52)+'px "Courier New",monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt.trim(),sz/2,y0+sh/2);
}

function drawBannerTxt(ctx,sz,t1,t2,t3,fg,bg,hasLg){
  var pad=sz*.08,maxW=sz-pad*2;
  ctx.fillStyle=fg;
  if(t3&&t3.trim()){
    var fs3=Math.round(sz*.037);
    ctx.font='bold '+fs3+'px "Courier New",monospace';
    var tw3=ctx.measureText(t3.trim().toUpperCase()).width;
    var th3=Math.round(fs3*1.65),ty3=Math.round(sz*.075);
    ctx.fillRect(pad,ty3,tw3+Math.round(sz*.04),th3);
    ctx.fillStyle=bg;ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(t3.trim().toUpperCase(),pad+Math.round(sz*.02),ty3+th3/2);
    ctx.fillStyle=fg;
  }
  if(t1&&t1.trim()){
    var fs1=Math.round(sz*.115);
    var t1c=t1.trim().toUpperCase();
    ctx.font='bold '+fs1+'px "Courier New",Courier,monospace';
    while(ctx.measureText(t1c).width>maxW&&fs1>22){fs1-=3;ctx.font='bold '+fs1+'px "Courier New",Courier,monospace';}
    var words=t1c.split(' '),lines=[],line='';
    words.forEach(function(w){var test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW){lines.push(line);line=w;}else line=test;});
    if(line)lines.push(line);
    ctx.textAlign='left';ctx.textBaseline='top';
    var ty1=Math.round(sz*(t3&&t3.trim()?0.21:0.1));
    lines.forEach(function(l,i){ctx.fillText(l,pad,ty1+i*Math.round(fs1*1.05));});
  }
  if(t2&&t2.trim()){
    var fs2=Math.round(sz*.041);
    ctx.font=fs2+'px "Courier New",Courier,monospace';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(t2.trim(),pad,hasLg?sz*.54:sz*.62);
  }
}

function makeCard(bgc,fgc,label,dlName){
  var card=document.createElement('div');card.className='card';
  var hd=document.createElement('div');hd.className='card-hd';
  hd.innerHTML='<div style="width:9px;height:9px;border-radius:50%;background:'+bgc+';"></div>'+label;
  var bd=document.createElement('div');bd.className='card-bd';
  var cv=document.createElement('canvas');bd.appendChild(cv);
  var ft=document.createElement('div');ft.className='card-ft';
  var btn=document.createElement('button');
  btn.textContent='Baixar PNG';btn.className='dl-btn';
  btn.style.background=bgc;btn.style.color='#1a1a1a';
  btn.onclick=function(){var a=document.createElement('a');a.download=dlName;a.href=cv.toDataURL();a.click();};
  ft.appendChild(btn);card.appendChild(hd);card.appendChild(bd);card.appendChild(ft);
  return{card:card,cv:cv};
}

function renderAvatar(){
  if(!_img)return;
  var circ=document.getElementById('circ').checked;
  var ht=document.getElementById('avHT').checked;
  var gs=parseInt(document.getElementById('avGS').value);
  var txt=document.getElementById('avTXT').value;
  var lg=document.getElementById('avLG').checked;
  var pv=document.getElementById('avPV');pv.innerHTML='';
  var sz=800;
  VARS.forEach(function(v){
    var r=makeCard(v.bg,v.fg,v.label,'avatar-thegarage-'+v.id+'.png');
    var cv=r.cv;cv.width=sz;cv.height=sz;
    cv.style.borderRadius=circ?'50%':'4px';
    pv.appendChild(r.card);
    var ctx=cv.getContext('2d');
    if(ht) drawPhotoHT(_img,ctx,sz,v.bg,v.fg,v.inv,circ,gs);
    else drawPhotoDT(_img,ctx,sz,v.bg,v.fg,circ);
    if(txt) drawHandle(ctx,sz,txt,v.fg,v.bg,lg);
    if(lg) drawLogos(ctx,sz,v.fg,v.bg);
  });
  pv.style.display='grid';
}

function renderBanner(){
  var t1=document.getElementById('bnT1').value;
  var t2=document.getElementById('bnT2').value;
  var t3=document.getElementById('bnT3').value;
  var ht=document.getElementById('bnHT').checked;
  var lg=document.getElementById('bnLG').checked;
  var gs=parseInt(document.getElementById('bnGS').value);
  var pv=document.getElementById('bnPV');pv.innerHTML='';
  var sz=800;
  VARS.forEach(function(v){
    var r=makeCard(v.bg,v.fg,v.label,'banner-thegarage-'+v.id+'.png');
    var cv=r.cv;cv.width=sz;cv.height=sz;
    cv.style.borderRadius='4px';
    pv.appendChild(r.card);
    var ctx=cv.getContext('2d');
    if(ht) drawWaveHT(ctx,sz,v.bg,v.fg,gs);
    else{ctx.fillStyle=v.bg;ctx.fillRect(0,0,sz,sz);}
    drawBannerTxt(ctx,sz,t1,t2,t3,v.fg,v.bg,lg);
    if(lg) drawLogos(ctx,sz,v.fg,v.bg);
  });
  pv.style.display='grid';
}

function loadFile(f){
  if(!f||!f.type.startsWith('image/'))return;
  var fr=new FileReader();
  fr.onload=function(e){var img=new Image();img.onload=function(){_img=img;document.getElementById('avCtrl').style.display='flex';renderAvatar();};img.src=e.target.result;};
  fr.readAsDataURL(f);
}
function onDrop(e){
  e.preventDefault();
  document.getElementById('dz').classList.remove('drag');
  loadFile(e.dataTransfer.files[0]);
}

document.getElementById('fi').onchange=function(e){loadFile(e.target.files[0]);};
document.getElementById('circ').onchange=renderAvatar;
document.getElementById('avHT').onchange=function(){document.getElementById('avHTrow').style.display=this.checked?'flex':'none';renderAvatar();};
document.getElementById('avGS').oninput=function(){document.getElementById('avGSo').textContent=this.value+'px';renderAvatar();};
document.getElementById('avTXT').oninput=renderAvatar;
